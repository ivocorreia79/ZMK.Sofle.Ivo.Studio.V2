include:
  # -------- DONGLE (CENTRAL) ----------
  - board: nice_nano
    shield: sofle_dongle
    snippet: studio-rpc-usb-uart
    artifact-name: sofle_dongle-nice_nano
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DCONFIG_ZMK_STUDIO_LOCKING=y
      -DCONFIG_SETTINGS=y
      -DCONFIG_ZMK_BLE=y
      -DCONFIG_BT=y
      -DCONFIG_BT_CENTRAL=y
      -DCONFIG_BT_PERIPHERAL=y
      -DCONFIG_EC11=n
      -DCONFIG_ZMK_USB=y

  # -------- LEFT (PERIPHERAL) ----------
  - board: nice_nano
    shield: sofle_left
    artifact-name: sofle_left-nice_nano
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DCONFIG_EC11=y
      -DCONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

  # -------- RIGHT (PERIPHERAL) ----------
  - board: nice_nano
    shield: sofle_right
    artifact-name: sofle_right-nice_nano
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DCONFIG_EC11=y
      -DCONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

  # -------- RESET ----------
  - board: nice_nano
    shield: settings_reset
    artifact-name: settings_reset-nice_nano
