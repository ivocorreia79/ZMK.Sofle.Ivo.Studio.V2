manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: cormoran
      url-base: https://github.com/cormoran

  projects:
    # ZMK com suporte do protocolo custom do Studio (necessário para RPC)
    - name: zmk
      remote: cormoran
      revision: "v0.3+custom-studio-protocol"
      import: file: app/west.yml

    # Módulo runtime para rotação de encoders via ZMK Studio
    - name: zmk-behavior-runtime-sensor-rotate
      remote: cormoran
      revision: main

  self:
    path: .
